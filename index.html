<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOYFIT24経堂 | Q&A</title>
    <meta name="description" content="JOYFIT24経堂のQ&A アプリ登録、PT予約、クレジットカード変更、オプション、法人入会、再入会、キャンペーン申請について">
    <meta property="og:title" content="JOYFIT24経堂 | Q&A">
    <meta property="og:description" content="JOYFIT24経堂のQ&Aページです">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ja_JP">
    <meta name="theme-color" content="#FFFFFF">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-bg: #FFFFFF;
            --logo-wine-bg: #A63646;
            --brand-red: #DC2626;
            --brand-red-dark: #B91C1C;
            --brand-red-soft: rgba(220, 38, 38, 0.12);
            --ink: #111827;
            --muted: #6B7280;
            --line: rgba(17, 24, 39, 0.07);
            --surface: #FFFFFF;
            --shadow-soft: 0 12px 40px rgba(17, 24, 39, 0.08);
            --shadow-tab: 0 4px 20px rgba(17, 24, 39, 0.06);
            --shadow-lift: 0 10px 28px rgba(17, 24, 39, 0.1);
            --shadow-red: 0 8px 22px rgba(220, 38, 38, 0.2);
            --radius: 1rem;
            --text-caption: 0.6875rem;
            --text-small: 0.75rem;
            --text-body: 0.8125rem;
            --text-body-lg: 0.875rem;
            --text-heading: 0.8125rem;
            --text-price: 0.8125rem;
            --leading-body: 1.75;
            --leading-tight: 1.55;
            --space-section: 1.5rem;
            --space-block: 1rem;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--ink);
            background-color: var(--page-bg);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            display: none;
        }
        main, header, footer { position: relative; z-index: 1; }

        .page-shell {
            max-width: 28rem;
            margin: 0 auto;
            padding-left: max(1.15rem, env(safe-area-inset-left));
            padding-right: max(1.15rem, env(safe-area-inset-right));
        }
        .header-shell {
            padding-top: max(2.25rem, env(safe-area-inset-top));
            padding-bottom: 1.5rem;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .hero-brand-line {
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.45rem;
            line-height: 1.1;
            filter: drop-shadow(0 3px 10px rgba(17, 24, 39, 0.07));
        }
        .hero-brand-main {
            font-weight: 900;
            letter-spacing: 0.04em;
            font-size: clamp(1.75rem, 5.5vw, 2.25rem);
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        .hero-brand-sub {
            font-weight: 800;
            color: var(--brand-red);
            letter-spacing: 0.14em;
            font-size: clamp(1.15rem, 4vw, 1.6rem);
            text-shadow: 0 2px 8px rgba(220, 38, 38, 0.12);
        }
        .hero-qa-tag {
            display: inline-block;
            margin-top: 0.75rem;
            padding: 0.38rem 0.95rem;
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.35em;
            color: var(--muted);
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid rgba(17, 24, 39, 0.08);
            border-radius: 9999px;
            box-shadow:
                0 3px 12px rgba(17, 24, 39, 0.07),
                inset 0 1px 0 rgba(255, 255, 255, 0.95);
        }

        /* ── Vertical tabs ── */
        .qa-tab-list {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-bottom: 1.25rem;
        }
        .qa-tab {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
            text-align: left;
            padding: 1.15rem 1.2rem 1.15rem 1.15rem;
            background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
            border: 2px solid rgba(220, 38, 38, 0.38);
            border-radius: 6px;
            color: var(--ink);
            font-size: 1.125rem;
            font-weight: 700;
            line-height: 1.4;
            cursor: pointer;
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s ease, background 0.25s;
            position: relative;
            box-shadow:
                0 2px 0 rgba(17, 24, 39, 0.04),
                0 4px 14px rgba(17, 24, 39, 0.06);
        }
        .qa-tab::before {
            display: none;
        }
        .qa-tab:active { transform: scale(0.985) translateY(1px); }
        .qa-tab.is-active {
            background: linear-gradient(180deg, #ffffff 0%, #fffbfb 100%);
            color: var(--ink);
            border-color: var(--brand-red);
            border-width: 2.5px;
            transform: translateY(-2px);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.9) inset,
                0 0 0 1px rgba(220, 38, 38, 0.1),
                0 8px 24px rgba(220, 38, 38, 0.16),
                0 3px 8px rgba(17, 24, 39, 0.08);
        }
        .qa-tab.is-active:active {
            transform: translateY(0) scale(0.985);
        }
        .qa-tab-num {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 2.75rem;
            height: 2.75rem;
            font-size: 0.9375rem;
            font-weight: 900;
            letter-spacing: 0.04em;
            color: var(--brand-red);
            border: 2px solid var(--brand-red);
            border-radius: 4px;
            background: linear-gradient(145deg, #ffffff 0%, #f9fafb 55%, #f3f4f6 100%);
            box-shadow:
                0 3px 10px rgba(220, 38, 38, 0.16),
                0 1px 2px rgba(17, 24, 39, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.95),
                inset 0 -1px 0 rgba(17, 24, 39, 0.04);
        }
        .qa-tab.is-active .qa-tab-num {
            color: #FFFFFF;
            background: linear-gradient(145deg, #F87171 0%, var(--brand-red) 42%, var(--brand-red-dark) 100%);
            border-color: var(--brand-red-dark);
            box-shadow:
                0 4px 14px rgba(220, 38, 38, 0.38),
                inset 0 1px 0 rgba(255, 255, 255, 0.28),
                inset 0 -2px 0 rgba(0, 0, 0, 0.12);
        }
        .qa-tab-label { flex: 1; letter-spacing: 0.02em; }

        .qa-panel-placeholder {
            display: block;
            padding: 2.5rem 1rem;
            text-align: center;
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--muted);
            line-height: 1.7;
            border-radius: var(--radius);
            background: linear-gradient(180deg, #fafafa 0%, #ffffff 100%);
            border: 1px dashed rgba(17, 24, 39, 0.1);
            box-shadow: inset 0 2px 8px rgba(17, 24, 39, 0.03);
        }
        .qa-panel-placeholder.is-hidden { display: none; }

        /* ── Panel (single view) ── */
        .qa-panel {
            display: none;
            animation: panelIn 0.42s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .qa-panel.is-active {
            display: block;
            margin-top: 0.35rem;
            padding: 1.2rem 1rem 1.5rem;
            background: linear-gradient(180deg, #ffffff 0%, #fcfcfc 100%);
            border: 1px solid rgba(17, 24, 39, 0.07);
            border-radius: calc(var(--radius) + 2px);
            box-shadow: var(--shadow-lift);
        }
        @keyframes panelIn {
            from { opacity: 0; transform: translateY(14px) scale(0.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .panel-intro {
            font-size: 0.875rem;
            color: var(--muted);
            line-height: 1.75;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--line);
        }
        .panel-body {
            padding-bottom: 0.5rem;
        }

        /* ── Accordion ── */
        details {
            padding: 1rem 0;
            border-bottom: 1px solid var(--line);
        }
        details:last-of-type { border-bottom: none; }
        summary {
            cursor: pointer;
            list-style: none;
            font-weight: 700;
            font-size: 0.925rem;
            line-height: 1.55;
            padding-right: 1.5rem;
            position: relative;
        }
        summary::-webkit-details-marker { display: none; }
        summary::after {
            content: "+";
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1;
            color: var(--brand-red);
        }
        details[open] summary::after {
            content: "−";
        }
        .qa-answer {
            margin-top: 0.85rem;
            color: #374151;
            font-size: 0.875rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .qa-link {
            display: inline-block;
            margin-top: 0.75rem;
            color: var(--brand-red);
            font-weight: 700;
            font-size: 0.8125rem;
            text-decoration: none;
            border-bottom: 1px solid rgba(220, 38, 38, 0.3);
        }
        .section-links {
            margin-top: var(--space-section);
            padding-top: var(--space-block);
            border-top: 1px solid var(--line);
        }

        /* ── App guide ── */
        .guide-banner {
            text-align: center;
            font-weight: 800;
            font-size: 0.68rem;
            letter-spacing: 0.22em;
            color: var(--brand-red);
            margin: 0 0 0.85rem;
        }
        .guide-lead {
            font-size: var(--text-body-lg);
            color: var(--muted);
            line-height: var(--leading-body);
            margin-bottom: var(--space-section);
            text-align: center;
        }
        .guide-section-head,
        .guide-subtitle {
            font-size: var(--text-heading);
            font-weight: 800;
            color: var(--ink);
            margin: var(--space-section) 0 var(--space-block);
            letter-spacing: 0.05em;
            padding-left: 0.55rem;
            border-left: 3px solid var(--brand-red);
        }
        .guide-section-head.is-flush,
        .guide-subtitle.is-flush {
            margin-top: 0;
        }
        .guide-anchor-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-bottom: var(--space-section);
            padding: 0.85rem 0.95rem;
            border-radius: calc(var(--radius) + 2px);
            background: linear-gradient(165deg, #ffffff 0%, rgba(254, 242, 242, 0.35) 100%);
            border: 1px solid rgba(220, 38, 38, 0.14);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.95) inset,
                0 4px 16px rgba(220, 38, 38, 0.06);
        }
        .guide-anchor-link {
            display: inline-flex;
            align-items: center;
            padding: 0.42rem 0.72rem;
            font-size: var(--text-small);
            font-weight: 700;
            letter-spacing: 0.03em;
            color: var(--brand-red);
            text-decoration: none;
            background: #fff;
            border: 1px solid rgba(220, 38, 38, 0.22);
            border-radius: 999px;
            box-shadow: 0 2px 6px rgba(220, 38, 38, 0.08);
            transition: background 0.2s ease, transform 0.15s ease;
        }
        .guide-anchor-link:active {
            transform: scale(0.97);
            background: rgba(254, 242, 242, 0.85);
        }
        .guide-anchor-section {
            scroll-margin-top: 0.75rem;
        }
        .guide-anchor-section.is-highlight {
            animation: anchorPulse 1.8s ease;
        }
        @keyframes anchorPulse {
            0%, 100% { box-shadow: none; }
            15%, 45% { box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.18); border-radius: calc(var(--radius) + 2px); }
        }
        .guide-step {
            margin-bottom: 1.75rem;
        }
        .guide-step-card {
            padding: 1.15rem 1.1rem 1.25rem;
            background: linear-gradient(165deg, #ffffff 0%, #f9fafb 100%);
            border-radius: calc(var(--radius) + 2px);
            border: 1px solid rgba(17, 24, 39, 0.06);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.9) inset,
                var(--shadow-soft);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.25s ease, transform 0.25s ease;
        }
        .guide-step-card::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(280px 120px at 100% 0%, rgba(220, 38, 38, 0.07), transparent 70%),
                radial-gradient(220px 100px at 0% 100%, rgba(255, 255, 255, 0.8), transparent 65%);
        }
        .guide-step-card > * { position: relative; z-index: 1; }
        .guide-intro-panel {
            margin-bottom: 1.25rem;
            padding: 1.05rem 1.1rem 1.15rem;
            border: 1px solid rgba(17, 24, 39, 0.08);
            border-radius: var(--radius);
            background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.9) inset,
                0 4px 16px rgba(17, 24, 39, 0.06);
        }
        .guide-intro-panel.is-featured {
            padding: 1.15rem 1.15rem 1.2rem 1.25rem;
            border-left: 3px solid var(--brand-red);
            background: linear-gradient(105deg, rgba(254, 242, 242, 0.45) 0%, #ffffff 42%, #fafafa 100%);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.95) inset,
                0 6px 22px rgba(220, 38, 38, 0.08);
        }
        .guide-intro-panel .guide-step-text {
            margin-bottom: 0;
        }
        .guide-intro-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .guide-intro-list li {
            position: relative;
            padding-left: 1rem;
            margin-bottom: 0.7rem;
            font-size: var(--text-body);
            font-weight: 600;
            color: #374151;
            line-height: var(--leading-body);
        }
        .guide-intro-list li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0.62em;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--brand-red);
            box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.15);
        }
        .guide-intro-list li:last-child {
            margin-bottom: 0;
        }
        .guide-card-update {
            margin-top: 1rem;
            padding: 0.9rem 0.95rem;
            border-radius: calc(var(--radius) - 2px);
            border: 1px dashed rgba(220, 38, 38, 0.22);
            background: rgba(255, 255, 255, 0.75);
        }
        .guide-card-update-note {
            font-size: 0.78rem;
            font-weight: 700;
            color: #4B5563;
            line-height: 1.75;
            margin: 0 0 0.8rem;
        }
        .guide-card-update-note:last-child {
            margin-bottom: 0;
        }
        .guide-cross-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--brand-red);
            border-radius: calc(var(--radius) - 2px);
            background: linear-gradient(180deg, #fff 0%, rgba(254, 242, 242, 0.75) 100%);
            color: var(--brand-red);
            font-weight: 800;
            font-size: 0.8125rem;
            letter-spacing: 0.04em;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s ease, box-shadow 0.25s ease, background 0.25s ease;
            box-shadow:
                0 2px 0 rgba(220, 38, 38, 0.08),
                0 5px 16px rgba(220, 38, 38, 0.14);
        }
        .guide-cross-link:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 2px 8px rgba(220, 38, 38, 0.12);
        }
        .guide-info-stack {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .guide-info-panel {
            border-radius: calc(var(--radius) + 2px);
            overflow: hidden;
            border: 1px solid rgba(220, 38, 38, 0.14);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.95) inset,
                0 6px 22px rgba(220, 38, 38, 0.08);
        }
        .guide-info-head,
        .guide-option-pricing-head {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.88rem 1rem;
            border: none;
            border-bottom: 1px dashed rgba(220, 38, 38, 0.2);
            background: linear-gradient(180deg, #ffffff 0%, rgba(254, 242, 242, 0.82) 100%);
            color: var(--brand-red);
            font-weight: 800;
            font-size: var(--text-heading);
            letter-spacing: 0.05em;
            box-shadow: 0 2px 0 rgba(220, 38, 38, 0.05);
        }
        .guide-info-body {
            padding: 1.05rem 1.1rem 1.15rem 1.2rem;
            background: linear-gradient(105deg, rgba(254, 242, 242, 0.38) 0%, #ffffff 48%, #fafafa 100%);
            border-left: 3px solid var(--brand-red);
        }
        .guide-info-link-wrap {
            margin: 0;
            text-align: center;
        }
        .guide-info-link {
            color: var(--brand-red);
            font-size: 0.8125rem;
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-thickness: 2px;
        }
        .guide-info-divider {
            height: 1px;
            margin: 0.85rem 0 0.9rem;
            background: linear-gradient(90deg, rgba(220, 38, 38, 0.22) 0%, rgba(220, 38, 38, 0.06) 100%);
        }
        .guide-caution-notice {
            margin-top: 1rem;
            padding: 1.05rem 1rem 1.1rem;
            border-radius: calc(var(--radius) - 2px);
            border: 2px solid rgba(153, 27, 27, 0.3);
            background: linear-gradient(165deg, rgba(254, 242, 242, 0.62) 0%, #ffffff 48%, #f9fafb 100%);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.95) inset,
                0 8px 28px rgba(127, 29, 29, 0.12);
        }
        .guide-caution-badge {
            display: inline-block;
            margin-bottom: 0.6rem;
            padding: 0.28rem 0.7rem;
            border-radius: 3px;
            font-size: 0.62rem;
            font-weight: 900;
            letter-spacing: 0.14em;
            color: #fff;
            background: linear-gradient(135deg, #991B1B 0%, var(--brand-red) 100%);
            box-shadow: 0 3px 10px rgba(153, 27, 27, 0.22);
        }
        .guide-caution-headline {
            margin: 0 0 0.4rem;
            font-size: 0.84rem;
            font-weight: 800;
            color: #7F1D1D;
            line-height: 1.65;
            letter-spacing: 0.03em;
        }
        .guide-caution-body {
            margin: 0 0 0.85rem;
            font-size: 0.74rem;
            font-weight: 600;
            color: #4B5563;
            line-height: 1.7;
        }
        .guide-caution-example {
            padding: 0.82rem 0.85rem 0.75rem;
            border-radius: calc(var(--radius) - 4px);
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(17, 24, 39, 0.08);
        }
        .guide-caution-example-title {
            margin: 0 0 0.55rem;
            font-size: 0.72rem;
            font-weight: 800;
            color: #374151;
            letter-spacing: 0.04em;
        }
        .guide-caution-timeline {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .guide-caution-step {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.5rem 0;
            border-bottom: 1px dashed rgba(17, 24, 39, 0.08);
        }
        .guide-caution-step:last-child {
            border-bottom: none;
            padding-bottom: 0.15rem;
        }
        .guide-caution-step-month {
            flex-shrink: 0;
            width: 2.85rem;
            font-size: 0.74rem;
            font-weight: 900;
            color: var(--brand-red);
            letter-spacing: 0.02em;
        }
        .guide-caution-step-label {
            flex: 1;
            min-width: 0;
            font-size: 0.73rem;
            font-weight: 600;
            color: #374151;
            line-height: 1.5;
        }
        .guide-caution-step-status {
            flex-shrink: 0;
            padding: 0.18rem 0.48rem;
            border-radius: 999px;
            font-size: 0.62rem;
            font-weight: 800;
            letter-spacing: 0.04em;
        }
        .guide-caution-step-status.is-no {
            color: #991B1B;
            background: rgba(153, 27, 27, 0.1);
            border: 1px solid rgba(153, 27, 27, 0.16);
        }
        .guide-caution-step-status.is-mid {
            color: #6B7280;
            background: rgba(17, 24, 39, 0.05);
            border: 1px solid rgba(17, 24, 39, 0.08);
        }
        .guide-caution-step-status.is-yes {
            color: var(--brand-red);
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.18);
        }
        .guide-caution-summary {
            margin: 0.72rem 0 0;
            padding-top: 0.65rem;
            border-top: 1px solid rgba(153, 27, 27, 0.12);
            font-size: 0.72rem;
            font-weight: 800;
            color: #7F1D1D;
            text-align: center;
            line-height: 1.65;
            letter-spacing: 0.03em;
        }
        .guide-fee-groups {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .guide-fee-group {
            padding: 0.85rem 0.9rem 0.75rem;
            border-radius: calc(var(--radius) - 2px);
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(220, 38, 38, 0.1);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.95) inset,
                0 3px 14px rgba(17, 24, 39, 0.05);
        }
        .guide-fee-badge {
            display: inline-flex;
            align-items: center;
            margin-bottom: 0.65rem;
            padding: 0.3rem 0.7rem;
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.07em;
        }
        .guide-fee-badge.is-full {
            background: linear-gradient(135deg, rgba(254, 242, 242, 0.95) 0%, rgba(255, 255, 255, 0.9) 100%);

            box-shadow: 0 4px 18px rgba(220, 38, 38, 0.08);
        }
        .guide-footnote.is-prominent::first-line,
        .guide-footnote.is-prominent .guide-notice-text::first-line {
            color: var(--brand-red);
            font-weight: 800;
        }
        .guide-notice-top {
            margin-bottom: 1.5rem;
        }
        .guide-notice-top.is-prominent {
            font-size: 0.875rem;
        }
        .guide-notice-text {
            margin: 0;
            white-space: pre-wrap;
            line-height: 1.8;
        }
        .guide-notice-link {
            display: inline-block;
            margin-top: 0.65rem;
            color: var(--brand-red);
            font-weight: 700;
            font-size: 0.8125rem;
            text-decoration: none;
            border-bottom: 1px solid rgba(220, 38, 38, 0.35);
            word-break: break-all;
        }
        .guide-step-note {
            font-size: 0.7rem;
            color: var(--muted);
            line-height: 1.6;
            margin: -0.15rem 0 0.75rem;
        }
        .guide-step-url {
            font-size: 0.72rem;
            color: var(--muted);
            word-break: break-all;
            margin-bottom: 0.85rem;
            line-height: 1.5;
        }
        .guide-step-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 0.85rem;
            padding: 0.8rem 1rem;
            background: linear-gradient(180deg, #EF4444 0%, var(--brand-red) 55%, var(--brand-red-dark) 100%);
            color: #fff;
            font-weight: 700;
            font-size: 0.8375rem;
            border-radius: var(--radius);
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.22);
            transition: transform 0.15s, box-shadow 0.2s;
        }
        .guide-step-link:active {
            transform: scale(0.98);
            box-shadow: 0 3px 12px rgba(220, 38, 38, 0.18);
        }
        .phone-wrap {
            display: flex;
            justify-content: center;
            padding: 0.35rem 0 0.15rem;
        }
        .phone-frame {
            width: min(100%, 218px);
            background: linear-gradient(165deg, #5a5a5c 0%, #3a3a3c 38%, #1c1c1e 100%);
            border-radius: 1.95rem;
            padding: 9px 8px;
            box-shadow:
                0 2px 0 rgba(255, 255, 255, 0.12) inset,
                0 14px 36px rgba(17, 24, 39, 0.18),
                0 4px 10px rgba(0, 0, 0, 0.12);
        }
        .phone-notch {
            width: 30%;
            height: 4px;
            background: #0a0a0a;
            border-radius: 9999px;
            margin: 0 auto 7px;
        }
        .phone-screen {
            border-radius: 1.45rem;
            overflow: hidden;
            background: #000;
            line-height: 0;
            aspect-ratio: 460 / 1024;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .phone-screen img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            object-position: top center;
        }
        .guide-branch {
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px dashed rgba(17, 24, 39, 0.12);
        }
        .guide-branch-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .site-footer-bar {
            background: linear-gradient(180deg, #B03A4A 0%, var(--logo-wine-bg) 100%);
            padding: 1.35rem 1rem calc(1.35rem + env(safe-area-inset-bottom));
        }
        .site-footer-bar .footer-logo-img {
            height: 1.85rem;
            width: auto;
            max-width: min(100%, 220px);
            display: block;
            margin: 0 auto;
            opacity: 0.95;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.2));
        }

        @media (prefers-reduced-motion: reduce) {
            .qa-panel,
            .guide-step-card.is-highlight,
            .guide-anchor-section.is-highlight,
            .pt-hero::before,
            .pt-hero::after,
            .pt-trainer-showcase,
            .pt-line-banner {
                animation: none;
            }
            .qa-tab,
            .guide-cross-link,
            .guide-anchor-link,
            .guide-step-card,
            .guide-action-banner,
            .pt-trainer-photo img,
            .pt-price-pill {
                transition: none;
            }
        }
    </style>
</head>
<body class="antialiased">

    <header class="w-full">
        <div class="page-shell header-shell">
            <h1 class="hero-brand-line">
                <span class="hero-brand-main">JOYFIT24</span>
                <span class="hero-brand-sub">経堂</span>
            </h1>
            <p class="hero-qa-tag">Q&amp;A</p>
        </div>
    </header>

    <main class="pb-8">
        <div class="page-shell">
            <nav id="qa-nav" class="qa-tab-list" aria-label="カテゴリ"></nav>
            <p id="qa-panel-placeholder" class="qa-panel-placeholder">項目をタップして内容を表示</p>
            <div id="qa-panels"></div>
        </div>
    </main>

    <footer class="site-footer-bar">
        <img src="joyfit_logo.png" alt="JOYFIT24" class="footer-logo-img">
    </footer>

    <script src="site-links.js"></script>
    <script src="app-guide.js"></script>
    <script src="qa-content.js"></script>
    <script>
        (function () {
            var nav = document.getElementById('qa-nav');
            var panelsEl = document.getElementById('qa-panels');
            var placeholderEl = document.getElementById('qa-panel-placeholder');
            var tabs = [];
            var panels = [];
            var activeId = '';

            function hrefFor(item) {
                if (item.linkKey) return resolveSiteLink(item.linkKey);
                return item.linkUrl || item.url || '#';
            }

            function buildPhoneScreen(step) {
                var wrap = document.createElement('div');
                wrap.className = 'phone-wrap';
                var frame = document.createElement('div');
                frame.className = 'phone-frame';
                frame.innerHTML = '<div class="phone-notch" aria-hidden="true"></div>';
                var screen = document.createElement('div');
                screen.className = 'phone-screen';
                var img = document.createElement('img');
                img.src = step.image;
                img.alt = step.title;
                img.loading = 'lazy';
                screen.appendChild(img);
                frame.appendChild(screen);
                wrap.appendChild(frame);
                return wrap;
            }

            function buildGuideStep(step) {
                var article = document.createElement('article');
                article.className = 'guide-step' + (step.cardStyle ? ' guide-step-card' : '');
                if (step.stepId) {
                    article.id = step.stepId;
                }
                var head = document.createElement('div');
                head.className = 'guide-step-head';
                if (step.num) {
                    var num = document.createElement('span');
                    num.className = 'guide-step-num';
                    num.textContent = step.num;
                    head.appendChild(num);
                }
                var title = document.createElement('h4');
                title.className = 'guide-step-title';
                title.textContent = step.title;
                head.appendChild(title);
                article.appendChild(head);
                if (step.note) {
                    var noteEl = document.createElement('p');
                    noteEl.className = 'guide-step-note';
                    noteEl.textContent = step.note;
                    article.appendChild(noteEl);
                }
                if (step.textHtml) {
                    var htmlText = document.createElement('p');
                    htmlText.className = 'guide-step-text';
                    htmlText.innerHTML = step.textHtml;
                    article.appendChild(htmlText);
                } else if (step.text) {
                    var text = document.createElement('p');
                    text.className = 'guide-step-text';
                    text.textContent = step.text;
                    article.appendChild(text);
                }
                var linkUrl = step.linkUrl || (step.linkKey ? resolveSiteLink(step.linkKey) : '');
                if (linkUrl && linkUrl.indexOf('http') === 0 && step.linkLabel) {
                    var banner = document.createElement('a');
                    banner.className = step.linkBanner === false ? 'guide-step-link' : 'guide-action-banner';
                    banner.href = linkUrl;
                    banner.textContent = step.linkLabel;
                    banner.target = '_blank';
                    banner.rel = 'noopener';
                    article.appendChild(banner);
                }
                if (step.image) {
                    article.appendChild(buildPhoneScreen(step));
                }
                if (step.closing) {
                    var closing = document.createElement('p');
                    closing.className = 'guide-step-closing';
                    closing.textContent = step.closing;
                    article.appendChild(closing);
                }
                return article;
            }

            function renderAppRegistrationGuide(container) {
                APP_REGISTRATION_GUIDE.registrationSteps.forEach(function (step) {
                    container.appendChild(buildGuideStep(step));
                });
            }

            function navigateToGuideStep(panelId, stepId) {
                var wasDifferent = activeId !== panelId;
                if (wasDifferent) {
                    switchPanel(panelId);
                }
                if (placeholderEl) {
                    placeholderEl.classList.add('is-hidden');
                }
                window.setTimeout(function () {
                    var el = document.getElementById(stepId);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.classList.add('is-highlight');
                        window.setTimeout(function () {
                            el.classList.remove('is-highlight');
                        }, 2000);
                    }
                }, wasDifferent ? 380 : 80);
            }

            function appendGuideBulletList(parent, lines) {
                if (!lines || !lines.length) return;
                var list = document.createElement('ul');
                list.className = 'guide-intro-list';
                lines.forEach(function (line) {
                    var li = document.createElement('li');
                    li.textContent = line;
                    list.appendChild(li);
                });
                parent.appendChild(list);
            }

            function appendGuideFeeGroups(parent, feeGroups) {
                if (!feeGroups || !feeGroups.length) return;
                var groups = document.createElement('div');
                groups.className = 'guide-fee-groups';
                feeGroups.forEach(function (group) {
                    var block = document.createElement('div');
                    block.className = 'guide-fee-group';
                    var badge = document.createElement('span');
                    badge.className = 'guide-fee-badge is-' + (group.badgeTone || 'full');
                    badge.textContent = group.badge;
                    block.appendChild(badge);
                    group.items.forEach(function (item) {
                        var row = document.createElement('div');
                        row.className = 'guide-fee-row';
                        var label = document.createElement('span');
                        label.className = 'guide-fee-label';
                        label.textContent = item.label;
                        var price = document.createElement('span');
                        price.className = 'guide-fee-price';
                        var ex = document.createElement('span');
                        ex.className = 'guide-fee-ex';
                        ex.textContent = item.exTax;
                        var inc = document.createElement('span');
                        inc.className = 'guide-fee-inc';
                        inc.textContent = '税込 ' + item.incTax;
                        price.appendChild(ex);
                        price.appendChild(inc);
                        row.appendChild(label);
                        row.appendChild(price);
                        block.appendChild(row);
                    });
                    groups.appendChild(block);
                });
                parent.appendChild(groups);
            }

            function appendGuideFeeExample(parent, example) {
                if (!example) return;
                var box = document.createElement('div');
                box.className = 'guide-fee-example';
                var title = document.createElement('p');
                title.className = 'guide-fee-example-title';
                title.textContent = example.title;
                box.appendChild(title);
                if (example.subtitle) {
                    var sub = document.createElement('p');
                    sub.className = 'guide-fee-example-sub';
                    sub.textContent = example.subtitle;
                    box.appendChild(sub);
                }
                var lines = document.createElement('div');
                lines.className = 'guide-fee-example-lines';
                example.lines.forEach(function (line) {
                    var row = document.createElement('div');
                    row.className = 'guide-fee-example-line';
                    var label = document.createElement('span');
                    label.className = 'guide-fee-example-line-label';
                    label.textContent = line.label;
                    var amount = document.createElement('span');
                    amount.className = 'guide-fee-example-line-amount';
                    amount.textContent = line.amount;
                    row.appendChild(label);
                    row.appendChild(amount);
                    lines.appendChild(row);
                });
                box.appendChild(lines);
                if (example.total) {
                    var total = document.createElement('div');
                    total.className = 'guide-fee-example-total';
                    var totalLabel = document.createElement('span');
                    totalLabel.className = 'guide-fee-example-total-label';
                    totalLabel.textContent = '合計（税込）';
                    var totalAmount = document.createElement('span');
                    totalAmount.className = 'guide-fee-example-total-amount';
                    totalAmount.innerHTML = '<small>税込</small>' + example.total;
                    total.appendChild(totalLabel);
                    total.appendChild(totalAmount);
                    box.appendChild(total);
                }
                if (example.note) {
                    var note = document.createElement('p');
                    note.className = 'guide-fee-example-note';
                    note.textContent = '※' + example.note;
                    box.appendChild(note);
                }
                parent.appendChild(box);
            }

            function renderOptionPricing(container, pricing) {
                if (!pricing || !pricing.items || !pricing.items.length) return;
                var section = document.createElement('section');
                section.className = 'guide-option-pricing';
                if (pricing.anchorId) {
                    section.id = pricing.anchorId;
                    section.classList.add('guide-anchor-section');
                }
                var card = document.createElement('div');
                card.className = 'guide-option-pricing-card';
                var head = document.createElement('div');
                head.className = 'guide-option-pricing-head';
                head.textContent = pricing.title || '各種オプション料金一覧';
                card.appendChild(head);
                if (pricing.lead) {
                    var lead = document.createElement('p');
                    lead.className = 'guide-option-pricing-lead';
                    lead.textContent = pricing.lead;
                    card.appendChild(lead);
                }
                var list = document.createElement('div');
                list.className = 'guide-option-pricing-list';
                pricing.items.forEach(function (item) {
                    var row = document.createElement('div');
                    row.className = 'guide-option-row';
                    var labelBlock = document.createElement('div');
                    labelBlock.className = 'guide-option-label-block';
                    var label = document.createElement('span');
                    label.className = 'guide-option-label';
                    label.textContent = item.label;
                    labelBlock.appendChild(label);
                    if (item.note) {
                        var meta = document.createElement('span');
                        meta.className = 'guide-option-meta';
                        meta.textContent = '※' + item.note;
                        labelBlock.appendChild(meta);
                    }
                    if (item.linkKey) {
                        var linkUrl = resolveSiteLink(item.linkKey);
                        if (linkUrl && linkUrl.indexOf('http') === 0) {
                            var link = document.createElement('a');
                            link.className = 'guide-option-link';
                            link.href = linkUrl;
                            link.textContent = '※' + (item.linkLabel || '詳細はこちら');
                            link.target = '_blank';
                            link.rel = 'noopener';
                            labelBlock.appendChild(link);
                        }
                    }
                    if (item.tag) {
                        var tag = document.createElement('span');
                        tag.className = 'guide-option-tag';
                        tag.textContent = item.tag;
                        labelBlock.appendChild(tag);
                    }
                    var price = document.createElement('span');
                    price.className = 'guide-fee-price';
                    var ex = document.createElement('span');
                    ex.className = 'guide-fee-ex';
                    ex.textContent = item.exTax;
                    var inc = document.createElement('span');
                    inc.className = 'guide-fee-inc';
                    inc.textContent = '税込 ' + item.incTax;
                    price.appendChild(ex);
                    price.appendChild(inc);
                    row.appendChild(labelBlock);
                    row.appendChild(price);
                    list.appendChild(row);
                });
                card.appendChild(list);
                section.appendChild(card);
                container.appendChild(section);
            }

            function appendGuideCautionNotice(parent, notice) {
                if (!notice) return;
                var box = document.createElement('div');
                box.className = 'guide-caution-notice';
                if (notice.badge) {
                    var badge = document.createElement('span');
                    badge.className = 'guide-caution-badge';
                    badge.textContent = notice.badge;
                    box.appendChild(badge);
                }
                if (notice.headline) {
                    var headline = document.createElement('p');
                    headline.className = 'guide-caution-headline';
                    headline.textContent = notice.headline;
                    box.appendChild(headline);
                }
                if (notice.body) {
                    var body = document.createElement('p');
                    body.className = 'guide-caution-body';
                    body.textContent = notice.body;
                    box.appendChild(body);
                }
                if (notice.timeline && notice.timeline.length) {
                    var example = document.createElement('div');
                    example.className = 'guide-caution-example';
                    if (notice.exampleTitle) {
                        var exampleTitle = document.createElement('p');
                        exampleTitle.className = 'guide-caution-example-title';
                        exampleTitle.textContent = notice.exampleTitle;
                        example.appendChild(exampleTitle);
                    }
                    var timeline = document.createElement('ul');
                    timeline.className = 'guide-caution-timeline';
                    notice.timeline.forEach(function (step) {
                        var row = document.createElement('li');
                        row.className = 'guide-caution-step';
                        var month = document.createElement('span');
                        month.className = 'guide-caution-step-month';
                        month.textContent = step.month;
                        var label = document.createElement('span');
                        label.className = 'guide-caution-step-label';
                        label.textContent = step.label;
                        row.appendChild(month);
                        row.appendChild(label);
                        if (step.status) {
                            var status = document.createElement('span');
                            status.className = 'guide-caution-step-status is-' + (step.statusTone || 'no');
                            status.textContent = step.status;
                            row.appendChild(status);
                        }
                        timeline.appendChild(row);
                    });
                    example.appendChild(timeline);
                    box.appendChild(example);
                }
                if (notice.summary) {
                    var summary = document.createElement('p');
                    summary.className = 'guide-caution-summary';
                    summary.textContent = notice.summary;
                    box.appendChild(summary);
                }
                parent.appendChild(box);
            }

            function scrollToAnchor(id) {
                var target = document.getElementById(id);
                if (!target) return;
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                target.classList.add('is-highlight');
                window.setTimeout(function () {
                    target.classList.remove('is-highlight');
                }, 1800);
            }

            function renderGuideAnchorNav(container, anchors) {
                if (!anchors || anchors.length < 2) return;
                var nav = document.createElement('nav');
                nav.className = 'guide-anchor-nav';
                nav.setAttribute('aria-label', 'ページ内目次');
                anchors.forEach(function (a) {
                    var link = document.createElement('a');
                    link.className = 'guide-anchor-link';
                    link.href = '#' + a.id;
                    link.textContent = a.label;
                    link.addEventListener('click', function (e) {
                        e.preventDefault();
                        scrollToAnchor(a.id);
                    });
                    nav.appendChild(link);
                });
                container.appendChild(nav);
            }

            function renderGuideInfoPanels(container, panels) {
                if (!panels || !panels.length) return;
                var stack = document.createElement('div');
                stack.className = 'guide-info-stack';
                panels.forEach(function (panel) {
                    var wrap = document.createElement('section');
                    wrap.className = 'guide-info-panel';
                    if (panel.anchorId) {
                        wrap.id = panel.anchorId;
                        wrap.classList.add('guide-anchor-section');
                    }
                    var head = document.createElement('div');
                    head.className = 'guide-info-head';
                    head.textContent = panel.title;
                    wrap.appendChild(head);
                    var body = document.createElement('div');
                    body.className = 'guide-info-body';
                    if (panel.bullets && panel.bullets.length) {
                        appendGuideBulletList(body, panel.bullets);
                    }
                    if (panel.cautionNotice) {
                        appendGuideCautionNotice(body, panel.cautionNotice);
                    }
                    if (panel.linkKey) {
                        var panelLinkUrl = resolveSiteLink(panel.linkKey);
                        if (panelLinkUrl && panelLinkUrl.indexOf('http') === 0) {
                            var linkWrap = document.createElement('p');
                            linkWrap.className = 'guide-info-link-wrap';
                            var panelLink = document.createElement('a');
                            panelLink.className = 'guide-info-link';
                            panelLink.href = panelLinkUrl;
                            panelLink.textContent = panel.linkLabel || '詳細はこちら';
                            panelLink.target = '_blank';
                            panelLink.rel = 'noopener';
                            linkWrap.appendChild(panelLink);
                            body.appendChild(linkWrap);
                        }
                    }
                    if (panel.feeGroups && panel.feeGroups.length) {
                        var divider = document.createElement('div');
                        divider.className = 'guide-info-divider';
                        divider.setAttribute('aria-hidden', 'true');
                        body.appendChild(divider);
                        appendGuideFeeGroups(body, panel.feeGroups);
                    } else if (panel.extraBullets && panel.extraBullets.length) {
                        var dividerAlt = document.createElement('div');
                        dividerAlt.className = 'guide-info-divider';
                        dividerAlt.setAttribute('aria-hidden', 'true');
                        body.appendChild(dividerAlt);
                        appendGuideBulletList(body, panel.extraBullets);
                    }
                    if (panel.footnote) {
                        var footnote = document.createElement('p');
                        footnote.className = 'guide-info-footnote';
                        footnote.textContent = panel.footnote;
                        body.appendChild(footnote);
                    }
                    if (panel.feeExample) {
                        appendGuideFeeExample(body, panel.feeExample);
                    }
                    wrap.appendChild(body);
                    stack.appendChild(wrap);
                });
                container.appendChild(stack);
            }

            function renderGuideIntroPanel(container, guide) {
                if (!guide.intro && !guide.introBullets && !guide.cardUpdateNote) return;
                var outer = null;
                if (guide.introAnchorId) {
                    outer = document.createElement('div');
                    outer.id = guide.introAnchorId;
                    outer.className = 'guide-anchor-section';
                }
                var panel = document.createElement('div');
                panel.className = 'guide-intro-panel' + (guide.introPanelStyle === 'featured' ? ' is-featured' : '');
                if (guide.introBullets && guide.introBullets.length) {
                    var list = document.createElement('ul');
                    list.className = 'guide-intro-list';
                    guide.introBullets.forEach(function (line) {
                        var li = document.createElement('li');
                        li.textContent = line;
                        list.appendChild(li);
                    });
                    panel.appendChild(list);
                } else if (guide.intro) {
                    var intro = document.createElement('p');
                    intro.className = 'guide-step-text';
                    intro.textContent = guide.intro;
                    panel.appendChild(intro);
                }
                if (guide.cardUpdateNote || guide.cardUpdateLink) {
                    var cardBox = document.createElement('div');
                    cardBox.className = 'guide-card-update';
                    if (guide.cardUpdateNote) {
                        var cardNote = document.createElement('p');
                        cardNote.className = 'guide-card-update-note';
                        cardNote.textContent = '※' + guide.cardUpdateNote;
                        cardBox.appendChild(cardNote);
                    }
                    if (guide.cardUpdateLink) {
                        var crossBtn = document.createElement('button');
                        crossBtn.type = 'button';
                        crossBtn.className = 'guide-cross-link';
                        crossBtn.textContent = guide.cardUpdateLink.label || '手順を見る';
                        crossBtn.addEventListener('click', function () {
                            navigateToGuideStep(guide.cardUpdateLink.panel, guide.cardUpdateLink.stepId);
                        });
                        cardBox.appendChild(crossBtn);
                    }
                    panel.appendChild(cardBox);
                }
                if (outer) {
                    outer.appendChild(panel);
                    container.appendChild(outer);
                } else {
                    container.appendChild(panel);
                }
            }

            function renderNavGuide(container, guide) {
                renderGuideAnchorNav(container, guide.anchorNav);
                if (guide.notice) {
                    renderProminentNotice(container, guide.notice, {
                        prominent: guide.noticeProminent !== false,
                        linkKey: guide.noticeLinkKey,
                        linkLabel: guide.noticeLinkLabel
                    });
                }
                renderGuideIntroPanel(container, guide);
                var stepsHost = container;
                var stepsSection = null;
                if (guide.stepsAnchorId && (guide.flowchart || guide.flowTitle || (guide.steps && guide.steps.length))) {
                    stepsSection = document.createElement('div');
                    stepsSection.id = guide.stepsAnchorId;
                    stepsSection.className = 'guide-anchor-section';
                    stepsHost = stepsSection;
                }
                if (guide.flowchart) {
                    var flowFig = document.createElement('figure');
                    flowFig.className = 'guide-flowchart-wrap';
                    var flowImg = document.createElement('img');
                    flowImg.src = guide.flowchart;
                    flowImg.alt = '未納金のお支払いフロー';
                    flowImg.loading = 'lazy';
                    flowFig.appendChild(flowImg);
                    stepsHost.appendChild(flowFig);
                }
                if (guide.flowTitle) {
                    var flowTitle = document.createElement('h3');
                    flowTitle.className = 'guide-section-head is-flush';
                    flowTitle.textContent = guide.flowTitle;
                    stepsHost.appendChild(flowTitle);
                }
                if (guide.steps && guide.steps.length) {
                    guide.steps.forEach(function (step) {
                        stepsHost.appendChild(buildGuideStep(Object.assign({ cardStyle: true }, step)));
                    });
                }
                if (stepsSection) {
                    container.appendChild(stepsSection);
                }
                if (guide.altPath) {
                    var altWrap = document.createElement('div');
                    altWrap.className = 'guide-section-divider';
                    if (guide.altPathAnchorId) {
                        altWrap.id = guide.altPathAnchorId;
                        altWrap.classList.add('guide-anchor-section');
                    }
                    if (guide.altPath.blockTitle) {
                        var altTitle = document.createElement('h3');
                        altTitle.className = 'guide-section-head is-flush';
                        altTitle.textContent = guide.altPath.blockTitle;
                        altWrap.appendChild(altTitle);
                    }
                    guide.altPath.steps.forEach(function (step) {
                        altWrap.appendChild(buildGuideStep(Object.assign({ cardStyle: true }, step)));
                    });
                    container.appendChild(altWrap);
                }
                if (guide.footnote) {
                    var note = document.createElement('p');
                    note.className = 'guide-footnote' + (guide.footnoteProminent ? ' is-prominent' : '');
                    note.textContent = guide.footnote;
                    container.appendChild(note);
                }
                renderGuideInfoPanels(container, guide.infoPanels);
                renderOptionPricing(container, guide.optionPricing);
            }

            function renderProminentNotice(container, notice, options) {
                options = options || {};
                var wrap = document.createElement('div');
                wrap.className = 'guide-footnote guide-notice-top' + (options.prominent !== false ? ' is-prominent' : '');
                var text = document.createElement('p');
                text.className = 'guide-notice-text';
                text.textContent = notice;
                wrap.appendChild(text);
                if (options.linkKey) {
                    var link = document.createElement('a');
                    link.className = 'guide-notice-link';
                    link.href = resolveSiteLink(options.linkKey);
                    link.textContent = options.linkLabel || link.href;
                    if (link.href.indexOf('http') === 0) {
                        link.target = '_blank';
                        link.rel = 'noopener';
                    }
                    wrap.appendChild(link);
                }
                container.appendChild(wrap);
            }

            function renderPtLineGuide(container, guide) {
                if (guide.hero) {
                    var hero = document.createElement('div');
                    hero.className = 'pt-hero pt-animate-in';
                    var brand = document.createElement('p');
                    brand.className = 'pt-hero-brand';
                    brand.textContent = guide.hero.brand || 'JOYFIT24 経堂';
                    hero.appendChild(brand);
                    var eyebrow = document.createElement('p');
                    eyebrow.className = 'pt-hero-eyebrow';
                    eyebrow.textContent = guide.hero.eyebrow || 'PERSONAL TRAINER';
                    hero.appendChild(eyebrow);
                    var lead = document.createElement('p');
                    lead.className = 'pt-hero-lead';
                    lead.innerHTML = (guide.hero.lead || '').replace('LINE', '<strong>LINE</strong>');
                    hero.appendChild(lead);
                    container.appendChild(hero);
                }
                if (guide.prices && guide.prices.length) {
                    var priceTitle = document.createElement('h3');
                    priceTitle.className = 'guide-subtitle pt-animate-in';
                    priceTitle.style.marginTop = '0';
                    priceTitle.textContent = 'パーソナル料金（税込）';
                    container.appendChild(priceTitle);
                    var priceStrip = document.createElement('div');
                    priceStrip.className = 'pt-price-strip pt-animate-in';
                    guide.prices.forEach(function (price) {
                        var pill = document.createElement('div');
                        pill.className = 'pt-price-pill';
                        pill.innerHTML =
                            '<span class="pt-price-duration">' + price.duration + '</span>' +
                            '<span class="pt-price-amount">' + price.amount + '</span>' +
                            '<span class="pt-price-tax">税込</span>';
                        priceStrip.appendChild(pill);
                    });
                    container.appendChild(priceStrip);
                }
                if (guide.notice) {
                    renderProminentNotice(container, guide.notice, { prominent: true });
                }
                if (!guide.trainers || !guide.trainers.length) return;
                var stack = document.createElement('div');
                stack.className = 'pt-trainer-stack';
                guide.trainers.forEach(function (trainer, index) {
                    var card = document.createElement('article');
                    var side = trainer.photoSide || (index % 2 === 0 ? 'right' : 'left');
                    card.className = 'pt-trainer-showcase is-photo-' + side +
                        (trainer.nameSei === '日下' ? ' is-kusaka' : '') +
                        (trainer.nameSei === '石田' ? ' is-ishida' : '');
                    var head = document.createElement('div');
                    head.className = 'pt-trainer-head is-photo-' + side;
                    var identity = document.createElement('div');
                    identity.className = 'pt-trainer-identity';
                    var kana = document.createElement('p');
                    kana.className = 'pt-trainer-kana';
                    kana.textContent = trainer.kana;
                    identity.appendChild(kana);
                    var name = document.createElement('p');
                    name.className = 'pt-trainer-name';
                    name.textContent = trainer.nameSei + ' ' + trainer.nameMei;
                    identity.appendChild(name);
                    var role = document.createElement('p');
                    role.className = 'pt-trainer-role';
                    role.textContent = 'PERSONAL TRAINER';
                    identity.appendChild(role);
                    head.appendChild(identity);
                    var photoWrap = document.createElement('div');
                    photoWrap.className = 'pt-trainer-photo';
                    var photo = document.createElement('img');
                    photo.src = trainer.photo;
                    photo.alt = trainer.nameSei + ' ' + trainer.nameMei + 'トレーナー';
                    photo.loading = 'lazy';
                    photoWrap.appendChild(photo);
                    head.appendChild(photoWrap);
                    card.appendChild(head);
                    var main = document.createElement('div');
                    main.className = 'pt-trainer-main';
                    if (trainer.highlights && trainer.highlights.length) {
                        var isRecords = !!trainer.highlights[0].value;
                        var hlBox = document.createElement('div');
                        hlBox.className = 'pt-highlight-box';
                        var hlTitle = document.createElement('p');
                        hlTitle.className = 'pt-highlight-title';
                        hlTitle.textContent = trainer.highlightTitle || '';
                        hlBox.appendChild(hlTitle);
                        var hlGrid = document.createElement('div');
                        hlGrid.className = 'pt-highlight-grid' + (isRecords ? '' : ' is-quals');
                        trainer.highlights.forEach(function (item) {
                            var cell = document.createElement('div');
                            cell.className = 'pt-highlight-item' + (item.value ? ' is-record' : '');
                            if (item.value) {
                                cell.innerHTML =
                                    '<span class="pt-hl-label">' + item.label + '</span>' +
                                    '<span class="pt-hl-value">' + item.value + '<small>' + (item.unit || '') + '</small></span>';
                            } else {
                                cell.textContent = item.label;
                            }
                            hlGrid.appendChild(cell);
                        });
                        hlBox.appendChild(hlGrid);
                        main.appendChild(hlBox);
                    }
                    if ((trainer.reco && trainer.reco.length) || (trainer.recoTags && trainer.recoTags.length)) {
                        var recoBox = document.createElement('div');
                        recoBox.className = 'pt-reco-box';
                        var recoTitle = document.createElement('p');
                        recoTitle.className = 'pt-reco-title';
                        recoTitle.textContent = 'こんな方にオススメです';
                        recoBox.appendChild(recoTitle);
                        if (trainer.recoTags && trainer.recoTags.length) {
                            var tags = document.createElement('div');
                            tags.className = 'pt-reco-tags';
                            trainer.recoTags.forEach(function (tag) {
                                var tagEl = document.createElement('span');
                                tagEl.className = 'pt-reco-tag';
                                tagEl.textContent = tag;
                                tags.appendChild(tagEl);
                            });
                            recoBox.appendChild(tags);
                        }
                        if (trainer.reco && trainer.reco.length) {
                            var recoList = document.createElement('ul');
                            recoList.className = 'pt-reco-list';
                            trainer.reco.forEach(function (line) {
                                var li = document.createElement('li');
                                li.textContent = line;
                                recoList.appendChild(li);
                            });
                            recoBox.appendChild(recoList);
                        }
                        main.appendChild(recoBox);
                    }
                    var cta = document.createElement('div');
                    cta.className = 'pt-cta-panel';
                    var lineUrl = trainer.lineUrl || (trainer.lineKey ? resolveSiteLink(trainer.lineKey) : '');
                    if (lineUrl && lineUrl.indexOf('http') === 0) {
                        var lineBtn = document.createElement('a');
                        lineBtn.className = 'pt-line-banner';
                        lineBtn.href = lineUrl;
                        lineBtn.textContent = 'こちらから友だち追加';
                        lineBtn.target = '_blank';
                        lineBtn.rel = 'noopener';
                        cta.appendChild(lineBtn);
                    }
                    main.appendChild(cta);
                    card.appendChild(main);
                    stack.appendChild(card);
                });
                container.appendChild(stack);
                if (guide.footnote) {
                    var note = document.createElement('p');
                    note.className = 'guide-footnote is-prominent';
                    note.textContent = '※' + guide.footnote;
                    container.appendChild(note);
                }
            }

            function renderCampaignApply(container, guide) {
                if (guide.notice) {
                    renderProminentNotice(container, guide.notice, {
                        prominent: guide.noticeProminent !== false
                    });
                }
                var linkUrl = resolveSiteLink(guide.linkKey);
                if (!linkUrl || linkUrl === '#') return;
                var box = document.createElement('div');
                box.className = 'guide-apply-banner-box';
                var banner = document.createElement('a');
                banner.className = 'guide-action-banner';
                banner.href = linkUrl;
                banner.textContent = guide.applyLabel || 'こちらから申請してください';
                banner.target = '_blank';
                banner.rel = 'noopener';
                box.appendChild(banner);
                container.appendChild(box);
            }

            function renderCorporateSection(container, section) {
                if (section.notice) {
                    renderProminentNotice(container, section.notice, { prominent: section.noticeProminent });
                }
                section.blocks.forEach(function (block) {
                    if (block.blockTitle) {
                        var subtitle = document.createElement('h3');
                        subtitle.className = 'guide-subtitle';
                        subtitle.textContent = block.blockTitle;
                        container.appendChild(subtitle);
                    }
                    if (block.intro) {
                        var blockIntro = document.createElement('p');
                        blockIntro.className = 'guide-step-text';
                        blockIntro.style.marginBottom = '1rem';
                        blockIntro.textContent = block.intro;
                        container.appendChild(blockIntro);
                    }
                    if (block.actionBanner) {
                        var actionUrl = resolveSiteLink(block.actionBanner.linkKey);
                        if (actionUrl && actionUrl.indexOf('http') === 0) {
                            var actionBox = document.createElement('div');
                            actionBox.className = 'guide-apply-banner-box';
                            var actionBtn = document.createElement('a');
                            actionBtn.className = 'guide-action-banner';
                            actionBtn.href = actionUrl;
                            actionBtn.textContent = block.actionBanner.label || 'APPインストール';
                            actionBtn.target = '_blank';
                            actionBtn.rel = 'noopener';
                            actionBox.appendChild(actionBtn);
                            container.appendChild(actionBox);
                        }
                    }
                    if (block.notice && !block.noticeAfter) {
                        renderProminentNotice(container, block.notice, {
                            prominent: block.noticeProminent,
                            linkKey: block.noticeLinkKey,
                            linkLabel: block.noticeLinkLabel
                        });
                    }
                    renderNavGuide(container, block);
                    if (block.notice && block.noticeAfter) {
                        renderProminentNotice(container, block.notice, {
                            prominent: block.noticeProminent,
                            linkKey: block.noticeLinkKey,
                            linkLabel: block.noticeLinkLabel
                        });
                    }
                });
            }

            function switchPanel(id, pushHash) {
                if (activeId === id) return;
                activeId = id;
                tabs.forEach(function (tab) {
                    tab.classList.toggle('is-active', tab.dataset.panel === id);
                    tab.setAttribute('aria-selected', tab.dataset.panel === id ? 'true' : 'false');
                });
                panels.forEach(function (panel) {
                    panel.classList.toggle('is-active', panel.id === 'panel-' + id);
                });
                if (placeholderEl) {
                    placeholderEl.classList.toggle('is-hidden', !!id);
                }
                if (pushHash !== false) {
                    if (id) {
                        history.replaceState(null, '', '#' + id);
                    } else {
                        history.replaceState(null, '', location.pathname + location.search);
                    }
                }
                var activePanel = document.getElementById('panel-' + id);
                if (activePanel) {
                    activePanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }

            if (SITE_LINKS.qaSelf && SITE_LINKS.qaSelf.indexOf('http') === 0) {
                var canonical = document.createElement('link');
                canonical.rel = 'canonical';
                canonical.href = SITE_LINKS.qaSelf;
                document.head.appendChild(canonical);
            }

            QA_MASTER.sections.forEach(function (section) {
                var tab = document.createElement('button');
                tab.type = 'button';
                tab.className = 'qa-tab';
                tab.dataset.panel = section.id;
                tab.setAttribute('role', 'tab');
                tab.setAttribute('aria-selected', 'false');
                tab.innerHTML =
                    '<span class="qa-tab-num">' + section.number + '</span>' +
                    '<span class="qa-tab-label">' + section.title + '</span>';
                tab.addEventListener('click', function () {
                    switchPanel(section.id);
                });
                nav.appendChild(tab);
                tabs.push(tab);

                var panel = document.createElement('div');
                panel.id = 'panel-' + section.id;
                panel.className = 'qa-panel';
                panel.setAttribute('role', 'tabpanel');

                if (section.intro) {
                    var intro = document.createElement('p');
                    intro.className = 'panel-intro';
                    intro.textContent = section.intro;
                    panel.appendChild(intro);
                }

                var body = document.createElement('div');
                body.className = 'panel-body';

                if (section.visualGuide === 'appRegistration' && typeof APP_REGISTRATION_GUIDE !== 'undefined') {
                    renderAppRegistrationGuide(body);
                }

                if (section.visualGuide === 'ptLine' && typeof APP_PT_LINE_GUIDE !== 'undefined') {
                    renderPtLineGuide(body, APP_PT_LINE_GUIDE);
                }

                if (section.visualGuide === 'creditCard' && typeof APP_CREDIT_CARD_GUIDE !== 'undefined') {
                    renderNavGuide(body, APP_CREDIT_CARD_GUIDE);
                }

                if (section.visualGuide === 'optionMenu' && typeof APP_OPTION_GUIDE !== 'undefined') {
                    renderNavGuide(body, APP_OPTION_GUIDE);
                }

                if (section.visualGuide === 'crowdStatus' && typeof APP_CROWD_STATUS_GUIDE !== 'undefined') {
                    renderNavGuide(body, APP_CROWD_STATUS_GUIDE);
                }

                if (section.visualGuide === 'corporateJoin' && typeof APP_CORPORATE_SECTION !== 'undefined') {
                    renderCorporateSection(body, APP_CORPORATE_SECTION);
                }

                if (section.visualGuide === 'rejoin' && typeof APP_REJOIN_SECTION !== 'undefined') {
                    renderCorporateSection(body, APP_REJOIN_SECTION);
                }

                if (section.visualGuide === 'campaignApply' && typeof APP_CAMPAIGN_APPLY_GUIDE !== 'undefined') {
                    renderCampaignApply(body, APP_CAMPAIGN_APPLY_GUIDE);
                }

                if (section.visualGuide === 'unpaidPayment' && typeof APP_UNPAID_GUIDE !== 'undefined') {
                    renderNavGuide(body, APP_UNPAID_GUIDE);
                }

                section.items.forEach(function (item) {
                    var details = document.createElement('details');
                    var summary = document.createElement('summary');
                    summary.textContent = item.q;
                    details.appendChild(summary);

                    var answer = document.createElement('div');
                    answer.className = 'qa-answer';
                    answer.textContent = item.a;
                    details.appendChild(answer);

                    if (item.linkKey || item.linkUrl) {
                        var link = document.createElement('a');
                        link.className = 'qa-link';
                        link.href = hrefFor(item);
                        link.textContent = item.linkLabel || '詳細はこちら';
                        if (link.href.indexOf('http') === 0) {
                            link.target = '_blank';
                            link.rel = 'noopener';
                        }
                        details.appendChild(link);
                    }

                    body.appendChild(details);
                });

                if (section.links && section.links.length) {
                    var linksWrap = document.createElement('div');
                    linksWrap.className = 'section-links';
                    section.links.forEach(function (l) {
                        var a = document.createElement('a');
                        a.className = 'qa-link block';
                        a.href = hrefFor(l);
                        a.textContent = '→ ' + l.label;
                        if (a.href.indexOf('http') === 0) {
                            a.target = '_blank';
                            a.rel = 'noopener';
                        }
                        linksWrap.appendChild(a);
                    });
                    body.appendChild(linksWrap);
                }

                panel.appendChild(body);
                panelsEl.appendChild(panel);
                panels.push(panel);
            });

            var hash = location.hash.replace('#', '');
            if (hash) {
                var found = QA_MASTER.sections.some(function (s) { return s.id === hash; });
                if (found) switchPanel(hash, false);
            }

            window.addEventListener('hashchange', function () {
                var h = location.hash.replace('#', '');
                if (h && h !== activeId) {
                    var ok = QA_MASTER.sections.some(function (s) { return s.id === h; });
                    if (ok) switchPanel(h, false);
                }
            });

        })();
    </script>
</body>
</html>
