<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOYFIT24経堂 | よくあるご質問・各種手続き</title>
    <meta name="description" content="JOYFIT24経堂のよくあるご質問。アプリ入会、オプション、契約変更、法人契約、学割・紹介・乗り換えキャンペーンの申請方法をまとめています。">
    <meta property="og:title" content="JOYFIT24経堂 | よくあるご質問・各種手続き">
    <meta property="og:description" content="お問い合わせの多い内容をカテゴリ別にまとめたQ&Aページです。">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ja_JP">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-bg: #F3F4F6;
            --logo-wine-bg: #A63646;
            --brand-red: #DC2626;
            --brand-red-dark: #B91C1C;
            --brand-red-soft: rgba(220, 38, 38, 0.14);
            --ink: #111827;
            --muted: #6B7280;
            --line: #E5E7EB;
            --surface: #FFFFFF;
        }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--ink);
            background-color: var(--page-bg);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(1200px 600px at 50% -10%, rgba(220, 38, 38, 0.07), transparent 60%),
                radial-gradient(900px 500px at 10% 20%, rgba(255, 255, 255, 0.9), transparent 55%),
                radial-gradient(900px 500px at 90% 20%, rgba(255, 255, 255, 0.7), transparent 55%);
        }
        main, header, footer { position: relative; z-index: 1; }
        .hero-brand-line {
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.45rem;
            line-height: 1.1;
        }
        .hero-brand-main {
            font-weight: 900;
            letter-spacing: 0.04em;
            font-size: clamp(1.8rem, 4.6vw, 2.4rem);
        }
        .hero-brand-sub {
            font-weight: 800;
            color: var(--brand-red);
            letter-spacing: 0.12em;
            font-size: clamp(1.2rem, 3.6vw, 1.65rem);
        }
        .page-title-card {
            margin-top: 1rem;
            background: var(--surface);
            border: 1px solid rgba(17, 24, 39, 0.10);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            box-shadow: 0 10px 22px rgba(17, 24, 39, 0.08);
        }
        .text-brand-red { color: var(--brand-red); }
        .nav-pill {
            display: block;
            padding: 0.65rem 1rem;
            border-radius: 9999px;
            border: 1px solid var(--line);
            background: var(--surface);
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--muted);
            transition: all 0.2s ease;
        }
        .nav-pill:hover {
            border-color: var(--brand-red);
            color: var(--brand-red);
        }
        .related-link {
            display: inline-flex;
            align-items: center;
            padding: 0.4rem 0.85rem;
            border-radius: 9999px;
            border: 1px solid rgba(220, 38, 38, 0.35);
            background: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--brand-red);
            transition: all 0.2s ease;
        }
        .related-link:hover {
            background: var(--brand-red-soft);
        }
        .qa-section {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 1rem;
            padding: 1.25rem 1.25rem 0.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(17, 24, 39, 0.06);
        }
        .section-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 2.25rem;
            height: 2.25rem;
            border-radius: 9999px;
            background: var(--brand-red);
            color: #fff;
            font-weight: 900;
            font-size: 0.875rem;
            margin-right: 0.5rem;
        }
        details {
            border-top: 1px solid var(--line);
            padding: 0.75rem 0;
        }
        details:first-of-type { border-top: none; }
        summary {
            cursor: pointer;
            list-style: none;
            font-weight: 700;
            font-size: 0.95rem;
            line-height: 1.5;
            padding-right: 1.5rem;
            position: relative;
        }
        summary::-webkit-details-marker { display: none; }
        summary::after {
            content: "+";
            position: absolute;
            right: 0;
            top: 0;
            color: var(--brand-red);
            font-weight: 900;
            font-size: 1.1rem;
        }
        details[open] summary::after { content: "−"; }
        .qa-answer {
            margin-top: 0.75rem;
            color: #374151;
            font-size: 0.925rem;
            line-height: 1.75;
            white-space: pre-wrap;
        }
        .qa-link {
            display: inline-block;
            margin-top: 0.75rem;
            color: var(--brand-red);
            font-weight: 700;
            font-size: 0.875rem;
            text-decoration: underline;
        }
        .section-links {
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px dashed var(--line);
            margin-bottom: 0.75rem;
        }
        .contact-box {
            background: #FEF2F2;
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 1rem;
            padding: 1.25rem;
        }
        .site-footer-bar {
            background-color: var(--logo-wine-bg);
            padding: 1.25rem 1rem;
        }
        .site-footer-bar .footer-logo-img {
            height: 2rem;
            width: auto;
            max-width: min(100%, 220px);
            display: block;
            margin: 0 auto;
        }
        /* ── アプリ図解ガイド ── */
        .guide-banner {
            text-align: center;
            font-weight: 900;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: var(--brand-red);
            padding: 0.6rem 1rem;
            margin: 1rem 0 1.25rem;
            border-top: 2px solid var(--brand-red);
            border-bottom: 2px solid var(--brand-red);
            background: #FEF2F2;
        }
        .guide-lead {
            font-size: 0.925rem;
            font-weight: 700;
            color: #374151;
            margin-bottom: 1.25rem;
            text-align: center;
        }
        .guide-subtitle {
            font-size: 0.875rem;
            font-weight: 900;
            color: var(--ink);
            margin: 1.5rem 0 1rem;
            padding-left: 0.75rem;
            border-left: 4px solid var(--brand-red);
        }
        .guide-step {
            display: flex;
            gap: 0.85rem;
            margin-bottom: 0;
            position: relative;
        }
        .guide-step + .guide-step {
            margin-top: 0.25rem;
        }
        .guide-branch .guide-step-body::before {
            display: none;
        }
        .guide-step-num {
            flex-shrink: 0;
            width: 2rem;
            height: 2rem;
            border-radius: 9999px;
            background: var(--brand-red);
            color: #fff;
            font-weight: 900;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 0.15rem;
            z-index: 2;
        }
        .guide-step-body {
            flex: 1;
            min-width: 0;
            padding-bottom: 1.5rem;
        }
        .guide-step:not(:last-child) .guide-step-body::before {
            content: "";
            position: absolute;
            left: 0.95rem;
            top: 2.25rem;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--brand-red), rgba(220, 38, 38, 0.15));
            z-index: 1;
        }
        .guide-step-title {
            font-weight: 900;
            font-size: 0.95rem;
            line-height: 1.45;
            margin-bottom: 0.35rem;
        }
        .guide-step-text {
            font-size: 0.85rem;
            color: #4B5563;
            line-height: 1.7;
            margin-bottom: 0.85rem;
        }
        .guide-step-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            margin-bottom: 0.85rem;
            padding: 0.5rem 1rem;
            background: var(--brand-red);
            color: #fff;
            font-weight: 700;
            font-size: 0.8rem;
            border-radius: 9999px;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(220, 38, 38, 0.25);
        }
        .guide-step-link:hover {
            background: var(--brand-red-dark);
        }
        .phone-wrap {
            display: flex;
            justify-content: center;
            padding: 0.5rem 0 0.25rem;
        }
        .phone-frame {
            width: min(100%, 260px);
            background: linear-gradient(145deg, #2d2d2d 0%, #1a1a1a 100%);
            border-radius: 2rem;
            padding: 10px;
            box-shadow:
                0 24px 48px rgba(17, 24, 39, 0.18),
                0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        }
        .phone-notch {
            width: 36%;
            height: 5px;
            background: #0a0a0a;
            border-radius: 9999px;
            margin: 0 auto 6px;
        }
        .phone-screen {
            position: relative;
            border-radius: 1.35rem;
            overflow: hidden;
            background: #000;
            line-height: 0;
        }
        .phone-screen img {
            width: 100%;
            height: auto;
            display: block;
        }
        .guide-branch {
            margin-top: 0.5rem;
            padding: 1rem;
            background: #FFFBEB;
            border: 1px dashed #F59E0B;
            border-radius: 0.75rem;
        }
        .guide-branch-label {
            font-size: 0.7rem;
            font-weight: 900;
            color: #B45309;
            letter-spacing: 0.08em;
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body class="antialiased">

    <header class="w-full">
        <div class="container mx-auto px-4 sm:px-6 pt-12 pb-6 flex flex-col items-center text-center">
            <h1 class="hero-brand-line">
                <span class="hero-brand-main">JOYFIT24</span>
                <span class="hero-brand-sub">経堂</span>
            </h1>
            <div class="page-title-card max-w-2xl w-full">
                <h2 class="text-xl sm:text-2xl font-black text-brand-red leading-tight">
                    よくあるご質問・各種手続き
                </h2>
                <p class="text-sm sm:text-base text-gray-600 font-semibold mt-2">
                    お問い合わせの多い内容をまとめています
                </p>
            </div>
            <nav id="related-pages" class="flex flex-wrap justify-center gap-2 mt-4 max-w-2xl w-full" aria-label="関連ページ"></nav>
        </div>
    </header>

    <main class="pb-16">
        <div class="container mx-auto px-4 sm:px-6 max-w-3xl">
            <nav id="qa-nav" class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-8"></nav>
            <div id="qa-sections"></div>
            <div id="qa-contact" class="contact-box mt-4"></div>
            <p id="qa-updated" class="text-center text-xs text-gray-400 mt-6"></p>
        </div>
    </main>

    <footer class="site-footer-bar">
        <img src="joyfit_logo.png" alt="JOYFIT24" class="footer-logo-img">
    </footer>

    <script src="site-links.js"></script>
    <script src="app-guide.js"></script>
    <script src="qa-content.js"></script>
    <script>
        (function () {
            var nav = document.getElementById('qa-nav');
            var sectionsEl = document.getElementById('qa-sections');
            var contactEl = document.getElementById('qa-contact');
            var updatedEl = document.getElementById('qa-updated');
            var relatedEl = document.getElementById('related-pages');

            function hrefFor(item) {
                if (item.linkKey) return resolveSiteLink(item.linkKey);
                return item.linkUrl || item.url || '#';
            }

            function buildPhoneScreen(step) {
                var wrap = document.createElement('div');
                wrap.className = 'phone-wrap';
                var frame = document.createElement('div');
                frame.className = 'phone-frame';
                frame.innerHTML = '<div class="phone-notch" aria-hidden="true"></div>';
                var screen = document.createElement('div');
                screen.className = 'phone-screen';
                var img = document.createElement('img');
                img.src = step.image;
                img.alt = step.title;
                img.loading = 'lazy';
                screen.appendChild(img);
                frame.appendChild(screen);
                wrap.appendChild(frame);
                return wrap;
            }

            function buildGuideStep(step, numClass) {
                var article = document.createElement('article');
                article.className = 'guide-step';
                var num = document.createElement('div');
                num.className = 'guide-step-num';
                num.textContent = step.num;
                var body = document.createElement('div');
                body.className = 'guide-step-body';
                var title = document.createElement('h4');
                title.className = 'guide-step-title';
                title.textContent = step.title;
                body.appendChild(title);
                if (step.text) {
                    var text = document.createElement('p');
                    text.className = 'guide-step-text';
                    text.textContent = step.text;
                    body.appendChild(text);
                }
                var linkUrl = step.linkUrl || (step.linkKey ? resolveSiteLink(step.linkKey) : '');
                if (linkUrl && linkUrl.indexOf('http') === 0) {
                    var link = document.createElement('a');
                    link.className = 'guide-step-link';
                    link.href = linkUrl;
                    link.textContent = step.linkLabel || 'リンクを開く';
                    link.target = '_blank';
                    link.rel = 'noopener';
                    body.appendChild(link);
                }
                if (step.image) {
                    body.appendChild(buildPhoneScreen(step));
                }
                article.appendChild(num);
                article.appendChild(body);
                return article;
            }

            function renderAppRegistrationGuide(container) {
                var g = APP_REGISTRATION_GUIDE;
                var banner = document.createElement('div');
                banner.className = 'guide-banner';
                banner.textContent = '━━【' + g.title + '】━━';
                container.appendChild(banner);
                var lead = document.createElement('p');
                lead.className = 'guide-lead';
                lead.textContent = g.lead;
                container.appendChild(lead);
                g.registrationSteps.forEach(function (step) {
                    var s = Object.assign({}, step);
                    if (!s.linkUrl && SITE_LINKS.memberSearch) {
                        s.linkUrl = SITE_LINKS.memberSearch;
                    }
                    container.appendChild(buildGuideStep(s));
                });
                var navTitle = document.createElement('h4');
                navTitle.className = 'guide-subtitle';
                navTitle.textContent = g.navTitle;
                container.appendChild(navTitle);
                if (g.navIntro) {
                    var navIntro = document.createElement('p');
                    navIntro.className = 'guide-step-text';
                    navIntro.style.marginBottom = '1rem';
                    navIntro.textContent = g.navIntro;
                    container.appendChild(navIntro);
                }
                g.navSteps.forEach(function (step) {
                    container.appendChild(buildGuideStep(step));
                });
                if (g.branchStep) {
                    var branch = document.createElement('div');
                    branch.className = 'guide-branch';
                    var branchLabel = document.createElement('p');
                    branchLabel.className = 'guide-branch-label';
                    branchLabel.textContent = '▼ 4番「ご予約について」を選んだ場合';
                    branch.appendChild(branchLabel);
                    branch.appendChild(buildGuideStep(g.branchStep));
                    container.appendChild(branch);
                }
            }

            if (typeof RELATED_PAGES !== 'undefined' && relatedEl) {
                RELATED_PAGES.forEach(function (p) {
                    var url = resolveSiteLink(p.key);
                    if (!url || url === '#') return;
                    var a = document.createElement('a');
                    a.className = 'related-link';
                    a.href = url;
                    a.textContent = p.label;
                    if (url.indexOf('http') === 0) {
                        a.target = '_blank';
                        a.rel = 'noopener';
                    }
                    relatedEl.appendChild(a);
                });
            }

            if (SITE_LINKS.qaSelf && SITE_LINKS.qaSelf.indexOf('http') === 0) {
                var canonical = document.createElement('link');
                canonical.rel = 'canonical';
                canonical.href = SITE_LINKS.qaSelf;
                document.head.appendChild(canonical);
                var ogUrl = document.createElement('meta');
                ogUrl.setAttribute('property', 'og:url');
                ogUrl.content = SITE_LINKS.qaSelf;
                document.head.appendChild(ogUrl);
            }

            QA_MASTER.sections.forEach(function (section) {
                var navLink = document.createElement('a');
                navLink.href = '#' + section.id;
                navLink.className = 'nav-pill text-left';
                navLink.textContent = section.number + ' ' + section.title;
                nav.appendChild(navLink);

                var block = document.createElement('section');
                block.id = section.id;
                block.className = 'qa-section';

                var heading = document.createElement('h3');
                heading.className = 'text-lg font-black mb-2 flex items-center';
                heading.innerHTML = '<span class="section-badge">' + section.number + '</span><span>' + section.title + '</span>';
                block.appendChild(heading);

                if (section.intro) {
                    var intro = document.createElement('p');
                    intro.className = 'text-sm text-gray-500 mb-3';
                    intro.textContent = section.intro;
                    block.appendChild(intro);
                }

                if (section.visualGuide === 'appRegistration' && typeof APP_REGISTRATION_GUIDE !== 'undefined') {
                    var guideWrap = document.createElement('div');
                    guideWrap.className = 'app-visual-guide mb-4';
                    renderAppRegistrationGuide(guideWrap);
                    block.appendChild(guideWrap);
                }

                section.items.forEach(function (item) {
                    var details = document.createElement('details');
                    var summary = document.createElement('summary');
                    summary.textContent = item.q;
                    details.appendChild(summary);

                    var answer = document.createElement('div');
                    answer.className = 'qa-answer';
                    answer.textContent = item.a;
                    details.appendChild(answer);

                    if (item.linkKey || item.linkUrl) {
                        var link = document.createElement('a');
                        link.className = 'qa-link';
                        link.href = hrefFor(item);
                        link.textContent = item.linkLabel || '詳細はこちら';
                        if (link.href.indexOf('http') === 0) {
                            link.target = '_blank';
                            link.rel = 'noopener';
                        }
                        details.appendChild(link);
                    }

                    block.appendChild(details);
                });

                if (section.links && section.links.length) {
                    var linksWrap = document.createElement('div');
                    linksWrap.className = 'section-links';
                    section.links.forEach(function (l) {
                        var a = document.createElement('a');
                        a.className = 'qa-link block';
                        a.href = hrefFor(l);
                        a.textContent = '→ ' + l.label;
                        if (a.href.indexOf('http') === 0) {
                            a.target = '_blank';
                            a.rel = 'noopener';
                        }
                        linksWrap.appendChild(a);
                    });
                    block.appendChild(linksWrap);
                }

                sectionsEl.appendChild(block);
            });

            var contactHtml =
                '<p class="font-bold text-brand-red mb-2">それでも解決しない場合</p>' +
                '<p class="text-sm text-gray-700 leading-relaxed">' + QA_MASTER.contact.note + '</p>' +
                '<p class="text-xs text-gray-500 mt-2">' + QA_MASTER.contact.hint + '</p>';
            var storeUrl = resolveSiteLink('storeHp');
            if (storeUrl && storeUrl.indexOf('http') === 0) {
                contactHtml += '<a class="qa-link block mt-3" href="' + storeUrl + '" target="_blank" rel="noopener">→ 店舗HPを開く</a>';
            }
            contactEl.innerHTML = contactHtml;

            if (QA_MASTER.updatedAt) {
                updatedEl.textContent = '最終更新: ' + QA_MASTER.updatedAt;
            }
        })();
    </script>
</body>
</html>
